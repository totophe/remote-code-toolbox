name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.tool }} — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tool: dcon
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            tool: dcon
          - os: macos-latest
            target: x86_64-apple-darwin
            tool: dcon
          - os: macos-latest
            target: aarch64-apple-darwin
            tool: dcon

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p ${{ matrix.tool }} --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.tool }} \
             ${{ matrix.tool }}-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.tool }}-${{ matrix.target }}
          path: ${{ matrix.tool }}-${{ matrix.target }}

  release:
    name: Publish latest release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          body: "Built from the tip of `main`. Updated on every push."
          prerelease: true
          files: "dcon-*"
